server {
    listen 80;
    server_name disc.cuatrocaminos.mx;

    # Frontend Angular (archivos estaticos)
    root /opt/disc-test/frontend;
    index index.html;

    # API -> backend Spring Boot en Docker
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Angular SPA routing: todo lo demas va a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos
    location ~* \.(js|css|ico|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
